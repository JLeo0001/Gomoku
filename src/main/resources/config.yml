# ============================================
# Gomoku Plugin Configuration
# ============================================

# Board settings
board:
  size: 19                     # Board size (e.g., 15 or 19)
  y-level: 64                  # Y coordinate for the board surface
  surface-block: SMOOTH_STONE  # Block used for the board surface
  grid-block: DARK_OAK_PLANKS # Block used for grid lines / border

# Timing (in seconds)
timing:
  lobby-countdown: 30          # Countdown before game starts
  turn-timeout: 60             # Max time per turn
  game-max-duration: 1800      # Max game duration (30 min)

# Spectator settings
spectator:
  max-per-arena: 10            # Max spectators per arena

# Sound effects
sounds:
  enabled: true
  countdown: BLOCK_NOTE_BLOCK_PLING        # Played each second during lobby countdown
  piece-place: BLOCK_STONE_PLACE           # Played when a piece is placed on the board
  win: ENTITY_PLAYER_LEVELUP               # Played to the winner
  lose: ENTITY_ENDERMAN_TELEPORT           # Played to the loser

# Multiverse integration
multiverse:
  enabled: true
  world-prefix: gomoku_arena_  # Prefix for arena worlds
